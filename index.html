<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>HUNTER GAMES</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><nav>
        <div class="logo">🏹 HUNTER GAMES</div>
        <div class="busqueda-container"><input type="text" id="input-busqueda"><button id="btn-buscar">Cazar</button></div>
        <div id="panel-usuario"></div>
    </nav></header>

    <main id="contenedor-juegos"></main>

    <div id="modal-auth" class="modal oculto"><div class="contenido-modal">
        <span class="cerrar" onclick="cerrarModales()">&times;</span>
        <form id="form-auth">
            <input type="email" id="auth-email" placeholder="Email" required>
            <input type="password" id="auth-password" placeholder="Pass" required>
            <button type="submit">Entrar</button>
        </form>
    </div></div>

    <div id="modal-detalles" class="modal oculto"><div class="contenido-modal ancho-grande">
        <span class="cerrar" onclick="cerrarModales()">&times;</span>
        <div id="contenido-detalles"></div>
    </div></div>

    <div id="modal-ia" class="modal oculto"><div class="contenido-modal ancho-grande">
        <span class="cerrar" onclick="cerrarModales()">&times;</span>
        <div id="mensaje-ia"></div>
        <div id="contenedor-recomendaciones" class="grid-juegos"></div>
    </div></div>

    <script src="app.js"></script>
</body>
</html>
